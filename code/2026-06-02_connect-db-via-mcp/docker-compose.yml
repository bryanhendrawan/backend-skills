services:
  postgres:
    image: postgres:16-alpine
    container_name: backend-skills-day7
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
    ports:
      - "5433:5432"
    volumes:
      - day7-pgdata:/var/lib/postgresql/data

volumes:
  day7-pgdata:
